name: frameflow

services:
  frameflow:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_LOCAL_ASR: ${INSTALL_LOCAL_ASR:-true}
        INSTALL_LOCAL_EMBEDDINGS: ${INSTALL_LOCAL_EMBEDDINGS:-false}
        VITE_API_BASE_URL: /api/v1
    image: frameflow:${FRAMEFLOW_TAG:-latest}
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      FRAMEFLOW_DATA_DIR: /data
      FRAMEFLOW_DATABASE_URL: sqlite:////data/frameflow.db
      FRAMEFLOW_FRONTEND_DIR: /app/frontend
      HOME: /data/home/frameflow
      XDG_CACHE_HOME: /data/cache
      TMPDIR: /tmp
      FRAMEFLOW_CORS_ORIGINS: ${FRAMEFLOW_CORS_ORIGINS:-}
      FRAMEFLOW_MAX_UPLOAD_MB: ${FRAMEFLOW_MAX_UPLOAD_MB:-100}
      FRAMEFLOW_MAX_SUBTITLE_CHARS: ${FRAMEFLOW_MAX_SUBTITLE_CHARS:-200000}
      FRAMEFLOW_READ_RATE_LIMIT_PER_MINUTE: ${FRAMEFLOW_READ_RATE_LIMIT_PER_MINUTE:-240}
      FRAMEFLOW_WRITE_RATE_LIMIT_PER_MINUTE: ${FRAMEFLOW_WRITE_RATE_LIMIT_PER_MINUTE:-60}
      FRAMEFLOW_AUTH_ENABLED: ${FRAMEFLOW_AUTH_ENABLED:-true}
      FRAMEFLOW_AUTH_LOCAL_SETUP_ENABLED: ${FRAMEFLOW_AUTH_LOCAL_SETUP_ENABLED:-true}
      FRAMEFLOW_AUTH_USERNAME: ${FRAMEFLOW_AUTH_USERNAME:-admin}
      FRAMEFLOW_AUTH_DISPLAY_NAME: ${FRAMEFLOW_AUTH_DISPLAY_NAME:-FrameFlow 管理员}
      FRAMEFLOW_AUTH_PASSWORD_HASH: ${FRAMEFLOW_AUTH_PASSWORD_HASH:-}
      FRAMEFLOW_AUTH_PASSWORD: ${FRAMEFLOW_AUTH_PASSWORD:-}
      FRAMEFLOW_AUTH_SESSION_HOURS: ${FRAMEFLOW_AUTH_SESSION_HOURS:-12}
      FRAMEFLOW_AUTH_COOKIE_SECURE: ${FRAMEFLOW_AUTH_COOKIE_SECURE:-true}
      FRAMEFLOW_WORKER_CONCURRENCY: ${FRAMEFLOW_WORKER_CONCURRENCY:-1}
      FRAMEFLOW_WORKER_POLL_SECONDS: ${FRAMEFLOW_WORKER_POLL_SECONDS:-0.75}
      FRAMEFLOW_STAGE_DELAY_SECONDS: ${FRAMEFLOW_STAGE_DELAY_SECONDS:-0.18}
      FRAMEFLOW_JOB_LEASE_SECONDS: ${FRAMEFLOW_JOB_LEASE_SECONDS:-300}
      FRAMEFLOW_JOB_MAX_EXECUTION_SECONDS: ${FRAMEFLOW_JOB_MAX_EXECUTION_SECONDS:-1800}
      FRAMEFLOW_PREVIEW_TIMEOUT: ${FRAMEFLOW_PREVIEW_TIMEOUT:-300}
      FRAMEFLOW_PREVIEW_MAX_SECONDS: ${FRAMEFLOW_PREVIEW_MAX_SECONDS:-180}
      DEMO_MODE: ${DEMO_MODE:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      HF_HOME: /data/models/huggingface
      LLM_PROVIDER: ${LLM_PROVIDER:-rules}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://llm-gateway.example.com/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gemini-3.1-flash-lite-preview}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-20}
      VISION_PROVIDER: ${VISION_PROVIDER:-none}
      VISION_BASE_URL: ${VISION_BASE_URL:-https://api.openai.com/v1}
      VISION_API_KEY: ${VISION_API_KEY:-}
      VISION_MODEL: ${VISION_MODEL:-gpt-4o-mini}
      VISION_TIMEOUT: ${VISION_TIMEOUT:-30}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      FRAMEFLOW_OPENAI_BASE_URL: ${FRAMEFLOW_OPENAI_BASE_URL:-https://api.openai.com/v1}
      FRAMEFLOW_ASR_MODEL: ${FRAMEFLOW_ASR_MODEL:-gpt-4o-mini-transcribe}
      FRAMEFLOW_ASR_PROVIDER: ${FRAMEFLOW_ASR_PROVIDER:-local}
      FRAMEFLOW_ASR_TIMEOUT: ${FRAMEFLOW_ASR_TIMEOUT:-120}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      FRAMEFLOW_DASHSCOPE_BASE_URL: ${FRAMEFLOW_DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/api/v1}
      FRAMEFLOW_ASR_PUBLIC_BASE_URL: ${FRAMEFLOW_ASR_PUBLIC_BASE_URL:-}
      FRAMEFLOW_ASR_URL_SIGNING_SECRET: ${FRAMEFLOW_ASR_URL_SIGNING_SECRET:-}
      FRAMEFLOW_DASHSCOPE_POLL_SECONDS: ${FRAMEFLOW_DASHSCOPE_POLL_SECONDS:-2}
      FRAMEFLOW_ASR_URL_TTL_SECONDS: ${FRAMEFLOW_ASR_URL_TTL_SECONDS:-1800}
      FRAMEFLOW_LOCAL_ASR_TIMEOUT: ${FRAMEFLOW_LOCAL_ASR_TIMEOUT:-600}
      FRAMEFLOW_WHISPER_MODEL: ${FRAMEFLOW_WHISPER_MODEL:-small}
      FRAMEFLOW_WHISPER_DEVICE: ${FRAMEFLOW_WHISPER_DEVICE:-cpu}
      FRAMEFLOW_WHISPER_COMPUTE_TYPE: ${FRAMEFLOW_WHISPER_COMPUTE_TYPE:-int8}
      FRAMEFLOW_WHISPER_DOWNLOAD_ROOT: /data/models/whisper
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-auto}
      FRAMEFLOW_EMBEDDING_MODEL: ${FRAMEFLOW_EMBEDDING_MODEL:-BAAI/bge-small-zh-v1.5}
      FRAMEFLOW_EMBEDDING_BASE_URL: ${FRAMEFLOW_EMBEDDING_BASE_URL:-https://api.openai.com/v1}
      FRAMEFLOW_EMBEDDING_API_KEY: ${FRAMEFLOW_EMBEDDING_API_KEY:-}
      FRAMEFLOW_EMBEDDING_TIMEOUT: ${FRAMEFLOW_EMBEDDING_TIMEOUT:-30}
      FRAMEFLOW_EMBEDDING_DEVICE: ${FRAMEFLOW_EMBEDDING_DEVICE:-cpu}
      IMAGE_API_BASE_URL: ${IMAGE_API_BASE_URL:-}
      IMAGE_API_KEY: ${IMAGE_API_KEY:-}
      IMAGE_MODEL: ${IMAGE_MODEL:-gpt-image-2}
      IMAGE_API_TIMEOUT: ${IMAGE_API_TIMEOUT:-180}
      IMAGE_MAX_RESPONSE_MB: ${IMAGE_MAX_RESPONSE_MB:-25}
      IMAGE_MAX_OUTPUT_MB: ${IMAGE_MAX_OUTPUT_MB:-15}
      IMAGE_MAX_PIXELS: ${IMAGE_MAX_PIXELS:-24000000}
      IMAGE_DRAFT_RETENTION_HOURS: ${IMAGE_DRAFT_RETENTION_HOURS:-72}
      IMAGE_DAILY_LIMIT: ${IMAGE_DAILY_LIMIT:-50}
      IMAGE_MAX_PENDING: ${IMAGE_MAX_PENDING:-5}
    expose:
      - "8000"
    volumes:
      - frameflow_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3)"]
      interval: 20s
      timeout: 5s
      start_period: 30s
      retries: 5
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=${FRAMEFLOW_TMPFS_SIZE:-256m}
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: ${FRAMEFLOW_PIDS_LIMIT:-256}
    cpus: ${FRAMEFLOW_CPUS:-2.0}
    mem_limit: ${FRAMEFLOW_MEMORY_LIMIT:-3g}
    # Keep this above IMAGE_API_TIMEOUT + 30s so tini/app.serve can terminate
    # the API, let the billed image request finish, and reap both worker pools.
    stop_grace_period: ${FRAMEFLOW_STOP_GRACE_PERIOD:-240s}
    logging:
      driver: json-file
      options:
        max-size: ${FRAMEFLOW_LOG_MAX_SIZE:-10m}
        max-file: ${FRAMEFLOW_LOG_MAX_FILES:-3}
    networks:
      - edge

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:?请在 deploy/.env 设置 DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:?请在 deploy/.env 设置 ACME_EMAIL}
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:-frameflow}
      BASIC_AUTH_HASH: ${BASIC_AUTH_HASH:-}
      CADDY_MAX_REQUEST_BODY: ${CADDY_MAX_REQUEST_BODY:-110MB}
    depends_on:
      frameflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:2015/healthz"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 5
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./deploy/caddy:/etc/caddy/conf.d:ro
      - caddy_data:/data
      - caddy_config:/config
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    pids_limit: ${CADDY_PIDS_LIMIT:-128}
    cpus: ${CADDY_CPUS:-0.50}
    mem_limit: ${CADDY_MEMORY_LIMIT:-256m}
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: ${CADDY_LOG_MAX_SIZE:-10m}
        max-file: ${CADDY_LOG_MAX_FILES:-3}
    networks:
      - edge

networks:
  edge:
    driver: bridge

volumes:
  frameflow_data:
    name: ${DATA_VOLUME_NAME:-frameflow_data}
  caddy_data:
    name: ${CADDY_DATA_VOLUME_NAME:-frameflow_caddy_data}
  caddy_config:
    name: ${CADDY_CONFIG_VOLUME_NAME:-frameflow_caddy_config}
